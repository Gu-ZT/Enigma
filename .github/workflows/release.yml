name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          go vet ./...
          go test -count=1 ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-snapshot}"
          suffix=""
          if [ "$GOOS" = "windows" ]; then suffix=".exe"; fi
          binary="enigma${suffix}"
          archive="enigma-${version}-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags "-s -w" -o "$binary" ./cmd/enigma
          mkdir "$archive"
          cp "$binary" "$archive/"
          cp README.md README.zh_CN.md LICENSE "$archive/"
          cp -R docs "$archive/docs"
          if [ "$GOOS" = "windows" ]; then
            zip -qr "${archive}.zip" "$archive"
            echo "ARCHIVE_PATH=${archive}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${archive}.tar.gz" "$archive"
            echo "ARCHIVE_PATH=${archive}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enigma-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: enigma-*
          merge-multiple: true
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
