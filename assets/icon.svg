<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Enigma Traffic Protocol</title>
  <desc id="desc">An animated Enigma rotor with authenticated data flowing around it.</desc>

  <defs>
    <linearGradient id="ring" x1="52" y1="45" x2="208" y2="211" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FE4D1"/>
      <stop offset=".52" stop-color="#62A9FF"/>
      <stop offset="1" stop-color="#C37BFF"/>
    </linearGradient>
    <linearGradient id="core" x1="94" y1="84" x2="163" y2="177" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58E8D2"/>
      <stop offset="1" stop-color="#2285D8"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Normalized circumference keeps dash spacing uniform at the seam. -->
    <path id="orbit" pathLength="360" d="M128 26a102 102 0 1 1 0 204a102 102 0 1 1 0-204Z"/>
    <path id="orbitInner" pathLength="360" d="M128 39a89 89 0 1 1 0 178a89 89 0 1 1 0-178Z"/>
  </defs>

  <!-- A compact plaque keeps the icon legible at small sizes. -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>

  <!-- Data orbit: dashed motion suggests a stream without implying encryption. -->
  <use xlink:href="#orbit" fill="none" stroke="#213A60" stroke-width="8" opacity=".7"/>
  <use xlink:href="#orbit" fill="none" stroke="url(#ring)" stroke-width="3" stroke-linecap="round"
    stroke-dasharray="3 9" filter="url(#softGlow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-360" dur="7s" repeatCount="indefinite"/>
  </use>
  <use xlink:href="#orbitInner" fill="none" stroke="#4FE4D1" stroke-opacity=".28" stroke-width="1.5"
    stroke-dasharray="1 11">
    <animate attributeName="stroke-dashoffset" from="0" to="360" dur="9s" repeatCount="indefinite"/>
  </use>

  <!-- Enigma machine body: a top panel, plugboard contacts, and three visible rotors. -->
  <g filter="url(#softGlow)">
    <rect x="50" y="64" width="156" height="132" rx="22" fill="#00000000" stroke="#4F6A9F" stroke-width="2.5"/>
    <rect x="64" y="75" width="128" height="25" rx="9" fill="#162849" stroke="#31507D" stroke-width="1.5"/>
    <path d="M77 87h102" stroke="#6EDFD2" stroke-opacity=".35" stroke-width="1.5" stroke-dasharray="2 7">
      <animate attributeName="stroke-dashoffset" from="0" to="-36" dur="4s" repeatCount="indefinite"/>
    </path>
    <g fill="#F6C85F" stroke="#FFE7A8" stroke-width="1">
      <circle cx="78" cy="87" r="3"/><circle cx="91" cy="87" r="3"/><circle cx="104" cy="87" r="3"/>
      <circle cx="152" cy="87" r="3"/><circle cx="165" cy="87" r="3"/><circle cx="178" cy="87" r="3"/>
    </g>
  </g>

  <g transform="translate(128 145)" filter="url(#glow)">
    <!-- Left rotor -->
    <g transform="translate(-39 0)">
      <circle r="32" fill="#132849" stroke="#57D9D0" stroke-width="3"/>
      <circle r="24" fill="none" stroke="#8AA5CF" stroke-opacity=".65" stroke-width="2" stroke-dasharray="2 5"/>
      <g>
        <path d="M0-30l5 10-5 7-5-7Z" fill="#57D9D0"/>
        <path d="M30 0l-10 5-7-5 7-5Z" fill="#57D9D0" opacity=".55"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
      </g>
      <circle r="9" fill="#0B1730" stroke="#F6C85F" stroke-width="2"/>
      <text x="0" y="4" fill="#F6C85F" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">I</text>
    </g>
    <!-- Middle rotor -->
    <g>
      <circle r="32" fill="#172B50" stroke="#FF7FA8" stroke-width="3"/>
      <circle r="24" fill="none" stroke="#A5B6D8" stroke-opacity=".68" stroke-width="2" stroke-dasharray="2 5"/>
      <g>
        <path d="M0-30l5 10-5 7-5-7Z" fill="#FF7FA8"/>
        <path d="M30 0l-10 5-7-5 7-5Z" fill="#FF7FA8" opacity=".55"/>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="11s" repeatCount="indefinite"/>
      </g>
      <circle r="9" fill="#0B1730" stroke="#F6C85F" stroke-width="2"/>
      <text x="0" y="4" fill="#F6C85F" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">II</text>
    </g>
    <!-- Right rotor -->
    <g transform="translate(39 0)">
      <circle r="32" fill="#142A48" stroke="#68D7FF" stroke-width="3"/>
      <circle r="24" fill="none" stroke="#B2C5E4" stroke-opacity=".72" stroke-width="2" stroke-dasharray="2 5"/>
      <g>
        <path d="M0-30l5 10-5 7-5-7Z" fill="#68D7FF"/>
        <path d="M30 0l-10 5-7-5 7-5Z" fill="#68D7FF" opacity=".55"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </g>
      <circle r="9" fill="#0B1730" stroke="#F6C85F" stroke-width="2"/>
      <text x="0" y="4" fill="#F6C85F" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">III</text>
    </g>
  </g>

  <!-- Reflector/contact rail and a single restrained activity pulse. -->
  <path d="M78 181h100" stroke="#6D84B5" stroke-opacity=".45" stroke-width="2" stroke-linecap="round"/>
  <circle cx="128" cy="181" r="5" fill="#F6C85F" filter="url(#softGlow)">
    <animate attributeName="r" values="4;7;4" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".65;1;.65" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Tiny protocol label: ETP/1 remains readable without relying on text for meaning. -->
  <g fill="#B9C8EA" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" text-anchor="middle">
    <text x="128" y="222">ETP / 1</text>
  </g>
</svg>
